[tasks."test:glia_core"]
dir = "glia_core"
run = "cargo test --lib"

[tasks."test:backend"]
depends = ["db:status-wait"]
run     = "uv run pytest backend/test --color=yes"

[tasks."test:glia_python"]
run = "uv run pytest glia_python/test --color=yes"

[tasks."test:gliar"]
description = "Run R package tests"
dir         = "gliar"
run         = "Rscript -e 'res <- testthat::test_local(); df <- as.data.frame(res); if (sum(df$failed) + sum(df$error) > 0) q(status = 1)'"

[tasks."test:e2e"]
description = "Tests client run, push to db, db write and query for integrity"
dir         = "."
run         = "uv run pytest test/e2e_glia_python_test.py"

[tasks."test:all"]
description = "Run all tests"
dir = "."
run = """
mise test:glia_core && \
mise test:backend && \
mise test:glia_python && \
mise test:gliar && \
mise test:e2e
"""
