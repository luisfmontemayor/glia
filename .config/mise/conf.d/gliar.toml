[tasks."gliar:build-clean"]
description = "Clean build artifacts without breaking R package structure"
dir = "gliar"
run = """
rm -f src/*.so src/*.o src/*.dll
rm -f R/extendr.R
touch NAMESPACE
rm -rf src/rust/target
"""

[tasks."gliar:bundle"]
description = "Sync minimal Rust core files and patch Cargo.toml for R"
dir = "gliar"
sources = [
  "../core/Cargo.toml",
  "../core/Cargo.lock",
  "../core/src/**/*.rs",
]
run = """
mise run gliar:build-clean

mkdir -p src/rust/src
cp ../core/Cargo.toml src/rust/
cp ../core/Cargo.lock src/rust/
rsync -a --delete ../core/src/ src/rust/src/

echo "Patching Cargo.toml for static linking..." &>2
sed -i 's/crate-type = \\[[^]]*\\]/crate-type = ["staticlib"]/' src/rust/Cargo.toml

echo "Patching Rust module name to 'gliar'..." &>2
sed -i 's/mod core;/mod gliar;/' src/rust/src/r_module.rs
"""

[tasks."gliar:sync-deps"]
description = "Sync R dependencies (Slow: run only when DESCRIPTION changes)"
dir = "gliar"
sources = ["DESCRIPTION", "renv.lock"]
run = """
Rscript -e "
  options(pak.sysreqs = FALSE);
  pak_enabled <- as.logical(toupper(Sys.getenv('RENV_CONFIG_PAK_ENABLED', 'TRUE')));
  options(renv.config.pak.enabled = pak_enabled);
  if (!requireNamespace('renv', quietly=TRUE)) install.packages('renv');
  renv::install();
  renv::snapshot(prompt = FALSE);
  "
"""

[tasks."gliar:build"]
description = "Fast build of the R package with Rust extensions"
dir = "gliar"
depends = ["gliar:sync-deps"]
sources = [
  "src/rust/src/**/*.rs",
  "R/**/*.R",
  "DESCRIPTION",
  "src/rust/Cargo.toml",
]
run = """
mise run gliar:bundle
Rscript -e "
  rextendr::document();
  devtools::install(upgrade = FALSE, quick = TRUE);
  "
"""

[tasks."gliar:install"]
description = "Compile Rust code and install gliar package locally"
dir         = "gliar"
depends     = ["setup:r-deps"]
run         = "Rscript -e 'devtools::install(quick = TRUE)'"