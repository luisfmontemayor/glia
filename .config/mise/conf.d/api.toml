[tasks."api:status"]
description = "Check API status"
run         = """
if curl -sf -o /dev/null http://localhost:8000/health/ready; then
  echo "SUCCESS: Backend API ready for requests"
else
  echo "ERROR: Backend API unable to take requests"
  exit 1
fi
"""

[tasks."api:status-wait"]
description = "Poll the API until it responds"
run = """
MAX_TRIES=15
COUNT=0
until mise run api:status > /dev/null 2>&1; do
  COUNT=$((COUNT + 1))
  if [ $COUNT -ge $MAX_TRIES ]; then
    mise run api:status
    exit 1
  fi
  printf "."
  sleep 1
done
echo "\n[SUCCESS] API is ready."
"""

[tasks."api:up"]
description = "Start API server"
run         = "uv run fastapi dev backend/main.py"

[tasks."api:down"]
description = "Stop API server"
run         = "lsof -t -i:${API_PORT:-8000} | xargs -r kill -15"
